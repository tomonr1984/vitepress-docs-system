name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Check build
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs:build

      - name: Check for build errors
        run: |
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful"

  # Link check (optional - helps catch broken links)
  link-check:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and serve documentation
        run: |
          npm run docs:build
          npm run docs:preview &
          sleep 10

      - name: Check homepage accessibility
        run: |
          curl -f http://localhost:4173/vitepress-docs-system/ || exit 1
          echo "Homepage is accessible"